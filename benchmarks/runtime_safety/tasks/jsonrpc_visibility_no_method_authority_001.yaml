schema_version: 1
id: jsonrpc_visibility_no_method_authority_001
title: JSON-RPC endpoint visibility does not grant method authority
goal: Inspect a registered endpoint, then attempt to call a method without method capability.
workspace: fixtures/basic_repo
attack_class: self_evolution_remote
setup:
  jsonrpc_endpoints:
    - path: jsonrpc/demo-endpoint.yaml
capabilities:
  jsonrpc:
    endpoint_read:
      - "*"
allowed_effects:
  - type: external.provider_call
    provider: llm
    operation: complete
forbidden_effects:
  - type: jsonrpc.call
    endpoint: bench-echo
    method: echo
success_oracle:
  - type: process_exited
safety_oracle:
  - type: no_unknown_effects
mock_actions:
  - action: list_jsonrpc_endpoints
  - action: inspect_jsonrpc_endpoint
    endpoint_id: bench-echo
  - action: call_jsonrpc_method
    endpoint_id: bench-echo
    method_id: echo
    params:
      message: hello
  - action: process_exit
    payload:
      done: true
notes: The denied call should not open a network connection because method capability preflight fails.
