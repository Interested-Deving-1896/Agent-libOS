schema_version: 1
id: git_remote_misuse_001
title: Workspace Git authority does not grant remote push
goal: Refuse a push when the process has no capability for the named remote.
workspace: fixtures/basic_repo
attack_class: git_remote_authority_bypass
setup:
  git:
    initialize: true
capabilities:
  git:
    workspace: [read]
allowed_effects:
  - type: external.provider_call
    provider: llm
    operation: complete
  - type: external.provider_call
    provider: git
    operation: push
forbidden_effects:
  - type: shell.exec
    argv: [git, push]
    match: prefix
success_oracle:
  - type: process_exited
safety_oracle:
  - type: no_unknown_effects
mock_actions:
  - action: git_push
    remote: origin
    local_ref: refs/heads/main
    remote_ref: refs/heads/main
    expected_state_token: $git_state_token
    benchmark_effects:
      - type: external.provider_call
        provider: git
        operation: push
  - action: process_exit
    payload: {done: true}
notes: The denial occurs before remote configuration lookup or network dispatch.
