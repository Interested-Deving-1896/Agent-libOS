name: tests

on:
  push:
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Compile Python sources
        run: uv run python -m compileall agent_libos tests scripts experiments benchmarks

      - name: Check architecture and blocking-work boundaries
        run: uv run python scripts/check_architecture.py

      - name: Check protected-operation coverage
        run: uv run python scripts/check_protected_operations.py

      - name: Check invariant manifest and pytest collection
        run: uv run python scripts/check_test_invariants.py

  release-artifacts:
    needs:
      - static
      - python
      - security
      - deterministic-release
      - postgres
      - gui
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Build and validate distributions
        run: |
          uv build --clear --out-dir dist
          python scripts/check_release_artifacts.py dist

      - name: Clean-install wheel and run entrypoint smoke
        run: |
          uv venv --python 3.11 .release-venv
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          uv pip install --python .release-venv/bin/python "$wheel"
          uv pip check --python .release-venv/bin/python
          smoke_root="$(mktemp -d)"
          cd "$smoke_root"
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -c "import agent_libos, importlib.metadata; assert agent_libos.__version__ == importlib.metadata.version('agent-libos')"
          "$GITHUB_WORKSPACE/.release-venv/bin/agent-libos" --help
          "$GITHUB_WORKSPACE/.release-venv/bin/agent-libos-gui-server" --help
          "$GITHUB_WORKSPACE/.release-venv/bin/agent-libos" --db local demo > demo.json

      - name: Clean-install source distribution
        run: |
          uv venv --python 3.11 .release-sdist-venv
          sdist="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          uv pip install --python .release-sdist-venv/bin/python "$sdist"
          uv pip check --python .release-sdist-venv/bin/python
          sdist_smoke_root="$(mktemp -d)"
          cd "$sdist_smoke_root"
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/python" -c "import agent_libos, importlib.metadata; assert agent_libos.__version__ == importlib.metadata.version('agent-libos')"
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/agent-libos" --help
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/agent-libos-gui-server" --help
          "$GITHUB_WORKSPACE/.release-sdist-venv/bin/agent-libos" --db local demo > demo.json

      - name: Preserve validated distributions
        uses: actions/upload-artifact@v4
        with:
          name: agent-libos-validated-distributions
          path: dist/*
          if-no-files-found: error

  python:
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        lane: ["unit", "runtime", "self-evolution", "providers", "benchmark"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run pytest lane
        timeout-minutes: 40
        run: |
          lane="${{ matrix.lane }}"
          cmd=(uv run python scripts/test_matrix.py --lane "$lane")
          case "$lane" in
            runtime)
              cmd+=(--max-lane-seconds 1800)
              ;;
            self-evolution)
              cmd+=(-n 4 --max-lane-seconds 1800)
              ;;
            providers)
              cmd+=(-n 4 --dist worksteal --max-lane-seconds 1800)
              ;;
          esac
          "${cmd[@]}"

  security:
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    name: security (${{ matrix.python-version }})

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run complete security lane
        timeout-minutes: 40
        run: >-
          uv run python scripts/test_matrix.py --lane security
          -n 4 --dist worksteal --max-lane-seconds 1800

  deterministic-release:
    needs: static
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run combined deterministic release matrix
        timeout-minutes: 40
        run: >-
          uv run python scripts/test_matrix.py --lane all
          -n 4 --dist worksteal --max-lane-seconds 1800

      - name: Run runtime-safety release smoke
        run: >-
          uv run python experiments/run_benchmark.py
          --suite benchmarks/runtime_safety
          --runner agent_libos_full
          --limit 3
          --require-all-passed
          --output .benchmark_runs/ci-release-smoke

      - name: Run 100k external-effect recovery scale smoke
        run: >-
          uv run python experiments/run_external_effect_recovery_scale.py
          --profile ci
          --output .benchmark_runs/external-effect-recovery-ci.json

      - name: Run 10k runtime-publication handler scale smoke
        run: >-
          uv run python experiments/run_publication_reconciliation_scale.py
          --profile ci
          --output .benchmark_runs/publication-reconciliation-ci.json

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: agent_libos
          POSTGRES_PASSWORD: agent_libos
          POSTGRES_DB: agent_libos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent_libos -d agent_libos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups --extra postgres

      - name: Run PostgreSQL store integration tests
        env:
          AGENT_LIBOS_POSTGRES_DSN: postgresql://agent_libos:agent_libos@127.0.0.1:5432/agent_libos
        run: uv run python -m pytest -m postgres --run-postgres

  gui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        run: npm --prefix gui ci

      - name: Run GUI checks
        run: |
          npm --prefix gui run test
          npm --prefix gui run typecheck
          npm --prefix gui run build
