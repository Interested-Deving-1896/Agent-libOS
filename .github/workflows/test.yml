name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        lane: ["unit", "runtime", "self-evolution", "providers", "benchmark"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Compile Python sources
        run: uv run python -m compileall agent_libos tests scripts experiments benchmarks

      - name: Check pytest collection
        run: uv run python -m pytest --collect-only -q tests

      - name: Check invariant manifest
        run: uv run python scripts/check_test_invariants.py

      - name: Run pytest lane
        run: uv run python scripts/test_matrix.py --lane ${{ matrix.lane }}

  security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        shard:
          - name: capability-policy
            paths: >-
              tests/security/test_capability.py
              tests/security/test_granular_permissions.py
              tests/security/test_permission_policy.py
              tests/security/test_human_question_tool.py
          - name: filesystem-shell-jit
            paths: >-
              tests/security/test_filesystem_directory_tools.py
              tests/security/test_shell_primitive.py
              tests/security/test_jit_security.py
          - name: external-resource
            paths: >-
              tests/security/test_external_boundaries.py
              tests/security/test_resource_constraints.py

    name: security (${{ matrix.python-version }}, ${{ matrix.shard.name }})

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: lts

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run security shard
        run: uv run python -m pytest ${{ matrix.shard.paths }}

  gui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        run: npm --prefix gui ci

      - name: Run GUI checks
        run: |
          npm --prefix gui run test
          npm --prefix gui run typecheck
          npm --prefix gui run build
